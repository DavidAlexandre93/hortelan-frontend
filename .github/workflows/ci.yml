name: CI - Frontend Quality, Security and Reliability

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality gate (lint, format, unit, coverage, build)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Lint
        run: npm run lint

      - name: Formatting check
        run: npm run format:check

      - name: Unit tests
        run: npm run test:unit

      - name: Coverage tests
        run: npm run test:coverage

      - name: Build validation
        run: npm run build

      - name: Frontend architectural audit
        run: npm run audit:frontend

      - name: Dependency vulnerability analysis
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build

  quality-control:
    name: Quality control (CodeQL + dependency review)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
