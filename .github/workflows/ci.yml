name: CI - Plataforma de Qualidade e Segurança

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validação Full Stack (build, testes, auditorias)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci


      - name: Testes
        run: npm test

      - name: Build
        run: npm run build

      - name: Auditoria de front-end
        run: npm run audit:frontend

      - name: NPM Audit (informativo)
        continue-on-error: true
        run: npm audit --audit-level=moderate

  semgrep:
    name: SAST com Semgrep
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          semgrep-version: latest
          config: >-
            p/default
            p/secrets

  dependency-review:
    name: Revisão de dependências
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
