name: Auto Remediation - Dependências Vulneráveis

on:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: read

concurrency:
  group: auto-remediate-deps
  cancel-in-progress: true

jobs:
  prepare-remediation:
    name: Preparar remediação automática
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout branch principal (read-only)
        uses: actions/checkout@v6
        with:
          ref: refs/heads/main
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Tentar correção automática de vulnerabilidades
        run: |
          npm audit fix || true
          npm update || true
          npm dedupe || true

      - name: Reinstalar lockfile limpo
        run: npm install --package-lock-only

      - name: Validar qualidade após correção
        continue-on-error: true
        run: |
          npm run lint
          npm test
          npm run build
          npm audit --audit-level=moderate

      - name: Gerar patch das alterações
        run: |
          git add -A
          git diff --cached > /tmp/auto-remediate.patch

      - name: Publicar patch
        uses: actions/upload-artifact@v4
        with:
          name: auto-remediate-patch
          path: /tmp/auto-remediate.patch

  create-pr:
    name: Criar PR de remediação
    needs: prepare-remediation
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout branch principal
        uses: actions/checkout@v6
        with:
          ref: refs/heads/main
          persist-credentials: false

      - name: Baixar patch
        uses: actions/download-artifact@v4
        with:
          name: auto-remediate-patch
          path: /tmp

      - name: Aplicar patch
        run: |
          if [ ! -s /tmp/auto-remediate.patch ]; then
            echo "Patch vazio. Nada para aplicar.";
            exit 0;
          fi
          git apply /tmp/auto-remediate.patch

      - name: Criar PR automático de remediação
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): remediar dependências vulneráveis automaticamente"
          title: "fix(security): remediação automática de vulnerabilidades de dependências"
          body: |
            ## 🤖 Remediação automática de segurança

            Este PR foi criado automaticamente para corrigir vulnerabilidades em dependências detectadas por auditorias contínuas.

            ### Alterações aplicadas
            - `npm audit fix`
            - `npm update`
            - `npm dedupe`
            - Regeneração do `package-lock.json`

            ### Validações executadas
            - `npm run lint`
            - `npm test`
            - `npm run build`
            - `npm audit --audit-level=moderate`

            > Se este PR existir sem mudanças relevantes, ele pode ser fechado com segurança.
          labels: |
            dependencies
            security
            automated-pr
          branch: automation/security-dependency-remediation
          delete-branch: true
